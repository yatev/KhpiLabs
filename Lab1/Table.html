<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>Таблиця</title>
    <style>
        table {
            border-collapse: collapse;
            width: 300px;
        }
        th, td {
            border: 1px solid black;
            padding: 6px;
            text-align: left;
        }
        th {
            background-color: #f2f2f2;
        }
    </style>
</head>
<body>

<table>
    <thead>
        <tr>
            <th>Прізвище</th>
            <th>Ім'я</th>
        </tr>
    </thead>
    <tbody>
        <tr>
            <td>Петренко</td>
            <td>Петро</td>
        </tr>
    </tbody>
</table>

</body>
</html>
